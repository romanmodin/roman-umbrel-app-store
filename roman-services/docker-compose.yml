services:
  zwave-js-ui:
    image: zwavejs/zwave-js-ui:latest
    restart: on-failure
    ports:
      - "8091:8091"
      - "3000:3000"
    devices:
      - "/dev/ttyACM0:/dev/ttyACM0"
    volumes:
      - zwave-js-ui_zwave-store:/usr/src/app/store
    environment:
      - TZ=America/Los_Angeles

  airvpn-runner:
    image: alpine:latest
    restart: on-failure
    network_mode: host
    privileged: true
    volumes:
      - /home/umbrel:/home/umbrel
    command: >
      sh -c "
      apk add --no-cache bash wireguard-tools iproute2 iptables;
      sleep 90;
      bash /home/umbrel/airvpn/start-airvpn.sh || true;
      ip route add default dev airvpn table 200 2>/dev/null || true;
      ip rule add fwmark 1 table 200 2>/dev/null || true;
      iptables -t mangle -F OUTPUT || true;
      iptables -t mangle -A OUTPUT -p tcp --dport 22573 -j MARK --set-mark 1 || true;
      iptables -t mangle -A OUTPUT -p tcp --dport 8333 -j MARK --set-mark 1 || true;
      tail -f /dev/null
      "

  nut-upsd:
    image: instantlinux/nut-upsd:latest
    restart: on-failure
    privileged: true
    ports:
      - "3493:3493"
    environment:
      - API_USER=upsmon
      - API_PASSWORD=changeme
      - DRIVER=usbhid-ups
      - NAME=cyberpower
    devices:
      - "/dev/bus/usb:/dev/bus/usb"

volumes:
  zwave-js-ui_zwave-store:
    external: true
